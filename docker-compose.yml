volumes:
  minio_data:
    driver: local

services:
  api:
    build:
      dockerfile: Dockerfile
      context: .
    environment:
      LOG_LEVEL: "info"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-root}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-supersecret}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-http://minio:9000}
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      S3_BUCKET: ${S3_BUCKET:-index}
    healthcheck:
      test: [ "CMD-SHELL", "curl -s localhost/health" ]
      interval: 2s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server --console-address ":9001" /data
    environment:
      - MINIO_ROOT_USER=root
      - MINIO_ROOT_PASSWORD=supersecret
      - MINIO_UPDATE=off
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 20s
      retries: 5