volumes:
  minio_data:
    driver: local
  db_data:
    driver: local

services:
  api:
    build:
      dockerfile: Dockerfile
      context: .
    environment:
      LOG_LEVEL: "info"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-root}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-supersecret}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-http://minio:9000}
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      S3_BUCKET: ${S3_BUCKET:-index}
      REDIS_CONNECTION_STRING: ${REDIS_CONNECTION_STRING:-valkey://valkey:6379}
      DB_CONNECTION_STRING: ${DB_CONNECTION_STRING:-postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/index_db}
    healthcheck:
      test: [ "CMD-SHELL", "curl -s localhost/health" ]
      interval: 2s
      timeout: 5s
      retries: 10
    depends_on:
      minio:
        condition: service_healthy
      valkey:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-root}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-supersecret}
      MINIO_UPDATE: "off"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 20s
      retries: 5

  valkey:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
  db:
    image: postgres:17
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_DB=index_db
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "embroidery", "-U", "postgres" ]
      interval: 15s
      timeout: 20s
      retries: 5